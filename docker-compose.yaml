services:
    client:
      build: ./client
      image: mohmeek/client
      container_name: client
      ports:
        - "4200:80"
      
    webapi:
      build: ./javaapi
      image: mohmeek/javaapi
      container_name: webapi
      ports:
        - "9000:8080"
      depends_on:
        - emartdb
    
    api:
      build: ./nodeapi
      image: mohmeek/nodeapi
      container_name: api
      ports:
        - "5000:5000"
      depends_on:
        - emongo
   
    nginx:
      image: nginx:alpine
      container_name: nginx
      ports:
          - "80:80"
      volumes:
          - ./nginx.conf:/etc/nginx/nginx.conf
      depends_on:
          - client
          - webapi
          - api

    emongo:
      image: mongo:4
      container_name: emongo
      ports:
        - "27017:27017"
      environment:
        - MONGO_INITDB_DATABASE=epoc

    emartdb:
      image: mysql:5.7.25
      container_name: mysql
      ports:
          - "3306:3306"
      environment:
          - MYSQL_ROOT_PASSWORD=emartdbpass
          - MYSQL_DATABASE=books
      volumes:
          - ./mysql_data:/var/lib/mysql

volumes:
  mysql_data:
      


    
